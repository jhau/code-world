<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codebase-world</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e14; }
      body { font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; color: #c8d0e0; }
      #app { position: fixed; inset: 0; }
      .overlay { position: fixed; z-index: 10; background: rgba(13, 17, 26, 0.88); border: 1px solid #2a3348; border-radius: 6px; padding: 10px 14px; }
      #hud { top: 12px; left: 12px; max-width: 340px; }
      #hud h1 { font-size: 14px; margin: 0 0 4px; color: #e8d56a; font-weight: 600; }
      #hud .worlds a { color: #9fb4d6; margin-right: 10px; }
      #hud .warn { color: #d4a15f; cursor: pointer; }
      #hud .hint { color: #6b7690; }
      #legend { margin-top: 6px; color: #8b95ab; }
      #legend .dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 7px; }
      #trace-status { margin-top: 6px; color: #c47fd4; }
      #panel { top: 12px; right: 12px; width: 320px; display: none; white-space: pre-wrap; word-break: break-all; }
      #panel .id { color: #e0a94f; font-weight: 600; }
      #panel .k { color: #6b7690; }
      #panel .close { float: right; cursor: pointer; color: #6b7690; }
      #fatal { top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 70vw; max-height: 70vh; overflow: auto; display: none; border-color: #d45f5f; }
      #fatal h2 { color: #d45f5f; margin-top: 0; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud" class="overlay">
      <h1 id="hud-title">codebase-world</h1>
      <div class="worlds">
        <a href="?world=/petstore/world.ir.yaml">petstore</a>
        <a href="?world=/toyshop/world.ir.yaml">toyshop</a>
      </div>
      <div id="hud-status"></div>
      <div id="legend"></div>
      <div id="trace-status"></div>
      <div class="hint">drag: orbit &middot; scroll: zoom &middot; right-drag: pan &middot; click: inspect &middot; click a building: reveal its deliveries &middot; click a datashape: trace its flows</div>
    </div>
    <div id="panel" class="overlay"></div>
    <div id="fatal" class="overlay"><h2>IR error</h2><pre id="fatal-body"></pre></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
